<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ports North Pilotage Certificate</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a3d62">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-gray-100 font-sans min-h-screen pb-12 select-none">

  <!-- App Header -->
  <header class="bg-[#0a3d62] p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center border-b border-blue-400">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 rounded-full bg-white flex items-center justify-center text-[#0a3d62] font-black text-xs">▲</div>
      <h1 class="text-md font-bold tracking-wider uppercase">Ports North Form</h1>
    </div>
    <span class="bg-emerald-600 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Mobile Grid V23</span>
  </header>

  <main class="max-w-xl mx-auto p-3 space-y-4">

    <!-- SECTION 1: CORE VOYAGE LOGISTICS -->
    <section class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md space-y-3">
      <h2 class="text-blue-400 font-bold text-xs uppercase tracking-wider border-b border-slate-700 pb-1">1. Voyage & Core Identification</h2>
      
      <div class="space-y-2 bg-slate-750 p-2.5 rounded-lg border border-slate-700">
        <div class="flex justify-between items-center">
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">Assigned Pilots</label>
          <button type="button" onclick="addNewListItem('pilotName1', 'Pilot Roster')" class="text-[10px] bg-slate-600 px-2 py-0.5 rounded font-bold text-white">+ Add Pilot Name</button>
        </div>
        <div class="space-y-1.5">
          <div class="flex items-center gap-2">
            <span class="text-[10px] text-blue-400 font-bold w-16 text-left">Pilot 1*</span>
            <select id="pilotName1" onchange="syncPilotLabel(this.value)" class="flex-1 p-2 rounded bg-slate-700 border border-slate-600 text-white text-xs focus:outline-none text-right"></select>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] text-slate-400 font-medium w-16 text-left">Pilot 2</span>
            <select id="pilotName2" class="flex-1 p-2 rounded bg-slate-700 border border-slate-600 text-white text-xs focus:outline-none text-right">
              <option value="">-- None --</option>
            </select>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] text-slate-400 font-medium w-16 text-left">Pilot 3</span>
            <select id="pilotName3" class="flex-1 p-2 rounded bg-slate-700 border border-slate-600 text-white text-xs focus:outline-none text-right">
              <option value="">-- None --</option>
            </select>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Date</label>
          <input type="date" id="date" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Movement Type</label>
          <div class="grid grid-cols-3 gap-1">
            <label class="flex items-center justify-center py-2 border border-slate-600 rounded-lg bg-slate-700 text-xs font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="movement" value="ARR" checked onclick="toggleRemLogic('ARR')" class="sr-only"> ARR</label>
            <label class="flex items-center justify-center py-2 border border-slate-600 rounded-lg bg-slate-700 text-xs font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="movement" value="DEP" onclick="toggleRemLogic('DEP')" class="sr-only"> DEP</label>
            <label class="flex items-center justify-center py-2 border border-slate-600 rounded-lg bg-slate-700 text-xs font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="movement" value="REM" onclick="toggleRemLogic('REM')" class="sr-only"> REM</label>
          </div>
        </div>
      </div>

      <div id="rem-duration-box" class="hidden bg-slate-750 p-2 rounded-lg border border-dashed border-slate-600 space-y-1">
        <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 text-left">Removal Duration</label>
        <div class="grid grid-cols-3 gap-1">
          <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 text-[11px] cursor-pointer has-[:checked]:bg-blue-950 has-[:checked]:border-blue-400"><input type="radio" name="duration" value="<3'" checked class="sr-only"> &lt;3'</label>
          <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 text-[11px] cursor-pointer has-[:checked]:bg-blue-950 has-[:checked]:border-blue-400"><input type="radio" name="duration" value="3-10'" class="sr-only"> 3-10'</label>
          <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 text-[11px] cursor-pointer has-[:checked]:bg-blue-950 has-[:checked]:border-blue-400"><input type="radio" name="duration" value=">10'" class="sr-only"> &gt;10'</label>
        </div>
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Vessel Name</label>
        <div class="flex gap-1">
          <select id="vesselName" class="flex-1 p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right font-bold"></select>
          <button type="button" onclick="addNewVesselPrompt()" class="px-3 bg-slate-600 rounded-lg text-sm font-bold">+</button>
          <button type="button" onclick="deleteActiveVessel()" class="px-3 bg-rose-950 border border-rose-800 rounded-lg text-xs font-bold text-rose-400">×</button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div class="flex flex-col">
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">From Station / Berth</label>
          <div class="flex gap-1 h-10">
            <select id="fromLoc" class="flex-1 p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-xs focus:outline-none text-right"></select>
            <button type="button" onclick="addNewListItem('fromLoc', 'Station')" class="px-2.5 bg-slate-600 rounded-lg text-xs font-bold">+</button>
          </div>
        </div>
        <div class="flex flex-col">
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">TO Station / Berth</label>
          <div class="flex gap-1 h-10">
            <select id="toLoc" class="flex-1 p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-xs focus:outline-none text-right"></select>
            <button type="button" onclick="addNewListItem('toLoc', 'Station')" class="px-2.5 bg-slate-600 rounded-lg text-xs font-bold">+</button>
          </div>
        </div>
      </div>
    </section>

    <!-- SECTION 2: VESSEL PARTICULARS -->
    <section class="bg-slate-800 rounded-xl border border-slate-700 shadow-md overflow-hidden">
      <button type="button" onclick="toggleDrawerNode('specs-drawer')" class="w-full p-4 flex justify-between items-center text-left focus:outline-none">
        <h2 class="text-blue-400 font-bold text-xs uppercase tracking-wider">2. Vessel Specifications (Particulars)</h2>
        <span id="drawer-arrow" class="text-xs text-slate-400 transition-transform">▼ Expand</span>
      </button>

      <div id="specs-drawer" class="hidden p-4 border-t border-slate-700 bg-slate-800/50 space-y-3">
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Draft Fore (xx.x)</label>
            <input type="number" step="0.1" inputmode="decimal" id="draftFore" placeholder="0.0" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Draft Aft (xx.x)</label>
            <input type="number" step="0.1" inputmode="decimal" id="draftAft" placeholder="0.0" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">IMO (7 Digits)</label>
            <input type="number" inputmode="numeric" pattern="[0-9]*" id="imoNumber" placeholder="1234567" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Gross Tonnage</label>
            <input type="number" inputmode="numeric" pattern="[0-9]*" id="grossTonnage" placeholder="Tons" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Flag</label>
            <div class="flex gap-1">
              <select id="flag" class="flex-1 p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-xs focus:outline-none text-right"></select>
              <button type="button" onclick="addNewListItem('flag', 'Flag')" class="px-2 bg-slate-600 rounded-lg text-xs font-bold">+</button>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Call Sign</label>
            <input type="text" id="callSign" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Deadweight (DWT)</label>
            <input type="number" inputmode="numeric" pattern="[0-9]*" id="dwt" placeholder="DWT" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">I.T. Cert (69)</label>
            <div class="grid grid-cols-2 gap-1">
              <label class="flex items-center justify-center py-2 border border-slate-600 rounded-lg bg-slate-700 text-xs font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="itCert" value="Yes" checked class="sr-only"> YES</label>
              <label class="flex items-center justify-center py-2 border border-slate-600 rounded-lg bg-slate-700 text-xs font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="itCert" value="No" class="sr-only"> NO</label>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-1">
          <div>
            <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 text-left">LOA (m)</label>
            <input type="number" step="0.1" inputmode="decimal" id="loa" placeholder="Length" class="w-full p-1.5 rounded bg-slate-700 border border-slate-600 text-xs text-white focus:outline-none text-right">
          </div>
          <div>
            <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 text-left">Breadth (m)</label>
            <input type="number" step="0.1" inputmode="decimal" id="beam" placeholder="Beam" class="w-full p-1.5 rounded bg-slate-700 border border-slate-600 text-xs text-white focus:outline-none text-right">
          </div>
          <div>
            <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 text-left">Build (YYYY)</label>
            <input type="number" inputmode="numeric" pattern="[0-9]*" id="buildDate" placeholder="Year" class="w-full p-1.5 rounded bg-slate-700 border border-slate-600 text-xs text-white focus:outline-none text-right">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Props Configuration</label>
            <div class="grid grid-cols-3 gap-1 text-[10px]">
              <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="props" value="Single" checked class="sr-only"> Single</label>
              <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="props" value="Twin" class="sr-only"> Twin</label>
              <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="props" value="Multi" class="sr-only"> Multi</label>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Pitch</label>
            <div class="grid grid-cols-2 gap-1">
              <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 text-[10px] font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="pitch" value="Fixed" checked class="sr-only"> Fixed</label>
              <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 text-[10px] font-bold cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="pitch" value="Controllable" class="sr-only"> C/P</label>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Propulsion Type</label>
            <div class="flex gap-1">
              <select id="propulsion" class="flex-1 p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-xs focus:outline-none text-right"></select>
              <button type="button" onclick="addNewListItem('propulsion', 'Type')" class="px-2 bg-slate-600 rounded-lg text-xs font-bold">+</button>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Service Speed (kts)</label>
            <input type="number" step="0.1" inputmode="decimal" id="speed" placeholder="XX" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm focus:outline-none text-right">
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Thrust Configuration</label>
          <div class="grid grid-cols-4 gap-1 text-[9px] font-bold">
            <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="thrust" value="None" checked onclick="evaluateThrustLogic()" class="sr-only"> None</label>
            <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="thrust" value="Bow" onclick="evaluateThrustLogic()" class="sr-only"> Bow</label>
            <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 cursor-pointer"><input type="radio" name="thrust" value="Stern" onclick="evaluateThrustLogic()" class="sr-only"> Stern</label>
            <label class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="thrust" value="Bow+Stern" onclick="evaluateThrustLogic()" class="sr-only"> B+S</label>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Thrust Power Source</label>
            <div class="grid grid-cols-3 gap-1 text-[10px] font-bold">
              <label id="lbl-tPower-Motor" class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="tPower" value="Motor" class="sr-only"> Motor</label>
              <label id="lbl-tPower-Electric" class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="tPower" value="Electric" class="sr-only"> Electric</label>
              <label id="lbl-tPower-NA" class="flex items-center justify-center py-1.5 border border-slate-600 rounded-md bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900 has-[:checked]:border-blue-500"><input type="radio" name="tPower" value="N/A" checked class="sr-only"> N/A</label>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 text-left">Helo Operations</label>
            <select id="helo" class="w-full p-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-xs focus:outline-hidden text-right">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
              <option value=">18m">&gt;18m</option>
              <option value=">22m">&gt;22m</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2 pt-1">
          <div class="flex items-center justify-between p-2 rounded-lg bg-slate-750 border border-slate-700 text-xs">
            <select id="rudders" class="p-1 rounded bg-slate-600 text-white text-[11px] text-right">
              <option value="Single">Single</option>
              <option value="Twin">Twin</option>
              <option value="Special">Special</option>
            </select>
            <label class="font-bold uppercase text-slate-400 ml-2 text-left">Rudders</label>
          </div>
          <div class="flex items-center justify-between p-2 rounded-lg bg-slate-750 border border-slate-700 text-xs">
            <div class="grid grid-cols-2 gap-0.5">
              <label class="px-2 py-0.5 border border-slate-600 bg-slate-700 text-[10px] rounded-sm text-center has-[:checked]:bg-blue-900"><input type="radio" name="bulbBow" value="Yes" checked class="sr-only"> Y</label>
              <label class="px-2 py-0.5 border border-slate-600 bg-slate-700 text-[10px] rounded-sm text-center has-[:checked]:bg-blue-900"><input type="radio" name="bulbBow" value="No" class="sr-only"> N</label>
            </div>
            <label class="font-bold uppercase text-slate-400 ml-2 text-left">Bulb Bow</label>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-1 text-[9px] font-bold bg-slate-750 p-2 rounded-lg border border-slate-700">
          <div>
            <label class="block text-slate-400 uppercase mb-0.5 text-left">Double Hull</label>
            <div class="grid grid-cols-2 gap-0.5">
              <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 has-[:checked]:bg-blue-900"><input type="radio" name="doubleHull" value="Yes" checked class="sr-only"> Y</label>
              <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 has-[:checked]:bg-blue-900"><input type="radio" name="doubleHull" value="No" class="sr-only"> N</label>
            </div>
          </div>
          <div>
            <label class="block text-slate-400 uppercase mb-0.5 text-left">Inert Gas</label>
            <div class="grid grid-cols-2 gap-0.5">
              <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 has-[:checked]:bg-blue-900"><input type="radio" name="inertGas" value="Yes" checked class="sr-only"> Y</label>
              <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 has-[:checked]:bg-blue-900"><input type="radio" name="inertGas" value="No" class="sr-only"> N</label>
            </div>
          </div>
          <div>
            <label class="block text-slate-400 uppercase mb-0.5 text-left">SBT</label>
            <div class="grid grid-cols-2 gap-0.5">
              <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 has-[:checked]:bg-blue-900"><input type="radio" name="sbt" value="Yes" checked class="sr-only"> Y</label>
              <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 has-[:checked]:bg-blue-900"><input type="radio" name="sbt" value="No" class="sr-only"> N</label>
            </div>
          </div>
        </div>

        <div class="bg-slate-750 p-2.5 rounded-lg border border-slate-700 space-y-2 text-left">
          <div class="flex justify-between items-center">
            <label class="flex items-center gap-1.5 text-xs text-amber-400 font-bold cursor-pointer">
              <input type="checkbox" id="ballastNA" onchange="toggleBallastNAFieldRules(this.checked)" class="rounded bg-slate-700 border-slate-600 checked:bg-blue-600"> Ballast Not Applicable (N/A)
            </label>
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Ballast Entry</span>
          </div>
          
          <div class="grid grid-cols-2 gap-2">
            <div id="wrapper-ballastTons">
              <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 mb-0.5 text-left">Discharge (Tons)</label>
              <input type="number" inputmode="numeric" pattern="[0-9]*" id="ballastTons" placeholder="Tons" class="w-full p-1.5 rounded bg-slate-700 border border-slate-600 text-xs text-white text-right focus:outline-none">
            </div>
            <div id="wrapper-ballastPlace">
              <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 mb-0.5 text-left">Ballast Position</label>
              <div class="grid grid-cols-4 gap-0.5 text-[9px] font-black">
                <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900"><input type="radio" name="ballastPlace" value="At Roads" checked class="sr-only"> Rds</label>
                <label class="flex items-center justify-center py-1 border border-slate-600 rounded-sm bg-slate-700 cursor-pointer has-[:checked]:bg-blue-900"><input type="radio" name="ballastPlace" value="At Anchor" class="sr-only"> Anc</label>

              <input type="time" id="clock_timeOutportArr" onchange="mergePickerFields('timeOutportArr')" class="flex-1 p-1.5 rounded-r-md bg-slate-700 border border-slate-600 text-xs text-white focus:outline-none text-right">

              Signature of Pilot: <span id="pilot-signature-label" class="text-blue-400 ml-1">BARCHETTI</span>

          <canvas id="pilot-signature" class="w-full h-24 border border-slate-600 rounded-lg bg-slate-50 touch-none"></canvas>

    <!-- BUTTON RUN BLOCK -->
    <section class="grid grid-cols-2 gap-3 pt-2">
      <button type="button" onclick="compileCertificatePDF(false)" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-wider shadow-md cursor-pointer transition-all">
        📥 Save Certificate (Local)
      </button>
      <button type="button" onclick="compileCertificatePDF(true)" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-wider shadow-md cursor-pointer transition-all">
        ✉️ Dispatch Email
      </button>
    </section>

  </main>

  <script>
    const defaults = {
      pilotName: ["BARCHETTI", "CHRISTENSEN", "FRIDOLF", "HUMPHREY", "JOHNSTON", "KILDAL", "OATES", "RAVANAT", "SCHOT", "STANLEY", "SYMONS", "THOMSON", "THORNTON", "WILKINSON"],
      fromLoc: ["ANCH A", "SEA", "Fairway", "PBG A", "PBG B", "C 123", "C 01", "C 02", "C 03", "C 04", "C 05", "C 06", "C 07", "C 08", "C 7+8", "C 10", "C 12"],
      toLoc: ["ANCH A", "SEA", "Fairway", "PBG A", "PBG B", "C 123", "C 01", "C 02", "C 03", "C 04", "C 05", "C 06", "C 07", "C 08", "C 7+8", "C 10", "C 12"],
      flag: ["Panama", "Singapore", "Marshall Islands", "Liberia", "Hong Kong", "Australia", "Bahamas"],
      propulsion: ["Motor", "Diesel Electric", "Steam", "Gas"]
    };

    let vesselList = ["MV Coral Trader", "Pacific Explorer", "Cairns Express", "Ocean Sovereign"];
    let masterPad, pilotPad;

    window.addEventListener('DOMContentLoaded', async () => {
      initCanvasDevice("master-signature", pad => masterPad = pad);
      initCanvasDevice("pilot-signature", pad => pilotPad = pad);

      const now = new Date();
      const dd = String(now.getDate()).padStart(2, '0');
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const yyyy = now.getFullYear();
      document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;

      ["timeDepStation", "timePilotOnBoard", "takeCon", "enterPortLastLine", "firstLineExitPort", "allFast", "timeDisembark", "timeArrStation", "timeOutportDep", "timeOutportArr", "cancellation"].forEach(id => {
        const dayEl = document.getElementById("day_" + id);
        if (dayEl) dayEl.value = dd;
      });

      try {
        for (let key in defaults) {
          if (key === 'pilotName') {
            let stored = await localforage.getItem('pnorth_v23_pilotName') || defaults.pilotName;
            renderSelectMenuOptions('pilotName1', stored);
            renderSelectMenuOptions('pilotName2', ["", ...stored]);
            renderSelectMenuOptions('pilotName3', ["", ...stored]);
          } else {
            let stored = await localforage.getItem('pnorth_v23_' + key) || defaults[key];
            renderSelectMenuOptions(key, stored);
          }
        }
        let storedVessels = await localforage.getItem('pnorth_v23_vessels') || vesselList;
        vesselList = storedVessels;
        renderAlphabeticalVessels();
        await loadPersistentStateData();
      } catch (e) {
        renderSelectMenuOptions('pilotName1', defaults.pilotName);
        renderSelectMenuOptions('pilotName2', ["", ...defaults.pilotName]);
        renderSelectMenuOptions('pilotName3', ["", ...defaults.pilotName]);
        for (let key in defaults) if(key !== 'pilotName') renderSelectMenuOptions(key, defaults[key]);
        renderAlphabeticalVessels();
      }

      syncPilotLabel(document.getElementById('pilotName1').value);
      evaluateThrustLogic();

      document.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('input', updateStateBackupStore);
      });
    });

    function initCanvasDevice(id, assign) {
      const canvas = document.getElementById(id);
      const r = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = canvas.offsetWidth * r;
      canvas.height = canvas.offsetHeight * r;
      canvas.getContext("2d").scale(r, r);
      assign(new SignaturePad(canvas, { backgroundColor: 'rgb(248, 250, 252)' }));
    }

    function renderSelectMenuOptions(id, arr) {
      const el = document.getElementById(id);
      if(el) el.innerHTML = arr.map(v => `<option value="${v}">${v === "" ? "-- None --" : v}</option>`).join('');
    }

    function renderAlphabeticalVessels() {
      vesselList.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
      renderSelectMenuOptions('vesselName', vesselList);
    }

    function syncPilotLabel(val) {
      const lbl = document.getElementById('pilot-signature-label');
      if (lbl) lbl.textContent = val || 'None';
    }

    function toggleRemLogic(v) {
      const box = document.getElementById('rem-duration-box');
      if(box) {
        if(v === 'REM') box.classList.remove('hidden');
        else box.classList.add('hidden');
      }
      updateStateBackupStore();
    }

    function toggleDrawerNode(id) {
      const el = document.getElementById(id);
      const arrow = document.getElementById('drawer-arrow');
      if(el.classList.contains('hidden')) {
        el.classList.remove('hidden');
        arrow.textContent = "▲ Collapse";
      } else {
        el.classList.add('hidden');
        arrow.textContent = "▼ Expand";
      }
    }

    function evaluateThrustLogic() {
      const thrustVal = document.querySelector('input[name="thrust"]:checked')?.value || 'None';
      const radMotor = document.querySelector('input[name="tPower"][value="Motor"]');
      const radElectric = document.querySelector('input[name="tPower"][value="Electric"]');
      const radNA = document.querySelector('input[name="tPower"][value="N/A"]');
      
      if (thrustVal === 'None') {
        if (radNA) radNA.checked = true;
        if (radMotor) radMotor.disabled = true;
        if (radElectric) radElectric.disabled = true;
        document.getElementById('lbl-tPower-Motor')?.classList.add('opacity-40', 'pointer-events-none');
        document.getElementById('lbl-tPower-Electric')?.classList.add('opacity-40', 'pointer-events-none');
      } else {
        if (radNA && radNA.checked && radMotor) radMotor.checked = true;
        if (radMotor) radMotor.disabled = false;
        if (radElectric) radElectric.disabled = false;
        document.getElementById('lbl-tPower-Motor')?.classList.remove('opacity-40', 'pointer-events-none');
        document.getElementById('lbl-tPower-Electric')?.classList.remove('opacity-40', 'pointer-events-none');
      }
      updateStateBackupStore();
    }

    function toggleBallastNAFieldRules(checked) {
      const tonsInput = document.getElementById('ballastTons');
      const placeRadios = document.querySelectorAll('input[name="ballastPlace"]');
      if (checked) {
        if(tonsInput) { tonsInput.value = ''; tonsInput.disabled = true; }
        placeRadios.forEach(r => r.disabled = true);
        document.getElementById('wrapper-ballastTons')?.classList.add('opacity-40', 'pointer-events-none');
        document.getElementById('wrapper-ballastPlace')?.classList.add('opacity-40', 'pointer-events-none');
      } else {
        if(tonsInput) tonsInput.disabled = false;
        placeRadios.forEach(r => r.disabled = false);
        document.getElementById('wrapper-ballastTons')?.classList.remove('opacity-40', 'pointer-events-none');
        document.getElementById('wrapper-ballastPlace')?.classList.remove('opacity-40', 'pointer-events-none');
      }
      updateStateBackupStore();
    }

    function applyDurationMask(input) {
      let clean = input.value.replace(/\D/g, '');
      if (clean.length > 5) clean = clean.slice(0, 5);
      
      if (clean.length > 2) {
        let mins = parseInt(clean.slice(-2), 10);
        if (mins > 59) mins = 59;
        let hrs = clean.slice(0, -2);
        input.value = `${hrs}:${String(mins).padStart(2, '0')}`;
      } else if (clean.length > 0) {
        input.value = clean;
      }
    }

    function mergePickerFields(baseId) {
      const dayVal = document.getElementById("day_" + baseId)?.value || '';
      const clockVal = document.getElementById("clock_" + baseId)?.value || '';
      if (dayVal && clockVal) {
        document.getElementById(baseId).value = `${dayVal}/${clockVal}`;
      } else {
        document.getElementById(baseId).value = '';
      }
      updateStateBackupStore();
    }

    function convertTo24HourPrintString(val) {
      if (!val) return '';
      if (val.includes('/')) {
        const parts = val.split('/');
        return `${parts[0]}/${parts[1]}`;
      }
      return val;
    }

    async function addNewVesselPrompt() {
      const v = prompt("Enter new Vessel Name:");
      if (!v || !v.trim()) return;
      const clean = v.trim();
      if (!vesselList.includes(clean)) {
        vesselList.push(clean);
        try { await localforage.setItem('pnorth_v23_vessels', vesselList); } catch(e) {}
        renderAlphabeticalVessels();
        document.getElementById('vesselName').value = clean;
        updateStateBackupStore();
      }
    }

    async function deleteActiveVessel() {
      const el = document.getElementById('vesselName');
      if(!el || !el.value) return;
      if(confirm(`Remove "${el.value}" from saved list?`)) {
        vesselList = vesselList.filter(item => item !== el.value);
        try { await localforage.setItem('pnorth_v23_vessels', vesselList); } catch(e) {}
        renderAlphabeticalVessels();
        updateStateBackupStore();
      }
    }

    async function addNewListItem(id, typeName) {
      const v = prompt(`Add custom option for ${typeName}:`);
      if (!v || !v.trim()) return;
      const clean = v.trim();
      
      try {
        let currentRoster = await localforage.getItem('pnorth_v23_pilotName') || defaults.pilotName;
        if (!currentRoster.includes(clean)) {
          currentRoster.push(clean);
          await localforage.setItem('pnorth_v23_pilotName', currentRoster);
          renderSelectMenuOptions('pilotName1', currentRoster);
          renderSelectMenuOptions('pilotName2', ["", ...currentRoster]);
          renderSelectMenuOptions('pilotName3', ["", ...currentRoster]);
          document.getElementById('pilotName1').value = clean;
          syncPilotLabel(clean);
        }
      } catch(e) {
        const el = document.getElementById('pilotName1');
        const opts = Array.from(el.options).map(o => o.value);
        if (!opts.includes(clean)) {
          opts.push(clean);
          renderSelectMenuOptions('pilotName1', opts);
          renderSelectMenuOptions('pilotName2', ["", ...opts]);
          renderSelectMenuOptions('pilotName3', ["", ...opts]);
          el.value = clean;
          syncPilotLabel(clean);
        }
      }
      updateStateBackupStore();
    }

    async function updateStateBackupStore() {
      try {
        const state = {};
        document.querySelectorAll('input, select, textarea').forEach(i => {
          if (i.type === 'checkbox') {
            state[i.id] = i.checked;
          } else if (i.type === 'radio') {
            if (i.checked) state[i.name] = i.value;
          } else if (i.id) {
            state[i.id] = i.value;
          }
        });
        await localforage.setItem('pnorth_v23_state', state);
      } catch(e) {}
    }

    async function loadPersistentStateData() {
      try {
        const s = await localforage.getItem('pnorth_v23_state');
        if (!s) return;
        for (let k in s) {
          let el = document.getElementById(k);
          if (el) {
            if (el.type === 'checkbox') {
              el.checked = s[k];
              if(k === 'ballastNA') toggleBallastNAFieldRules(s[k]);
            } else {
              el.value = s[k];
              if (k === 'movement') toggleRemLogic(s[k]);
              if (k === 'pilotName1') syncPilotLabel(s[k]);
            }
          } else {
            let rad = document.querySelector(`input[name="${k}"][value="${s[k]}"]`);
            if (rad) rad.checked = true;
          }
        }
      } catch(e) {}
    }

    function compileCertificatePDF(dispatchEmail = false) {
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');

        const getValue = id => document.getElementById(id)?.value || '';
        const getRadio = name => document.querySelector(`input[name="${name}"]:checked`)?.value || '';

        let pilotChain = getValue('pilotName1');
        if (getValue('pilotName2')) pilotChain += ` / ${getValue('pilotName2')}`;
        if (getValue('pilotName3')) pilotChain += ` / ${getValue('pilotName3')}`;

        // Header Title
        doc.setFont("Helvetica", "bold"); doc.setFontSize(22); doc.text("Pilotage Certificate", 12, 18);

        // Logo configuration
        const logoImg = new Image();
        logoImg.src = 'image_2bdbd6.png';
        try {
          doc.addImage(logoImg, 'PNG', 148, 8, 42, 12);
        } catch (e) {
          doc.setFont("Helvetica", "bold"); doc.setFontSize(16); doc.text("Ports North", 160, 16);
        }

        let rowH = 7; 
        let sY = 25;
        let totalGridHeight = 12 * rowH; // Definitive 12 Rows Frame parameters

        let remarksTopY = sY + totalGridHeight;
        let certTextY = remarksTopY + 31;
        let sigTopY = certTextY + 4;
        let absoluteFrameBottomY = sigTopY + 32;

        // Outer Structural Perimeter Box
        doc.setDrawColor(0,0,0); doc.setLineWidth(0.4);
        doc.rect(10, sY, 190, absoluteFrameBottomY - sY); 

        // Structural Horizontal Dividing Lines
        for (let i = 1; i < 12; i++) {
          doc.line(10, sY + (i * rowH), 200, sY + (i * rowH));
        }
        
        // Vertical Columns Configuration Boundaries
        let c1 = 80;  
        let c2 = 140; 
        doc.line(c1, sY, c1, sY + totalGridHeight);  
        doc.line(c2, sY, c2, sY + totalGridHeight); 

        doc.setFontSize(9.5); doc.setFont("Helvetica", "bold");

        // --- ROW POPULATION ENGINE WITH PRECISE LAYOUT MAPPING ---
        // Row 1
        doc.text("Pilot(s)", 12, sY + 4.5);
        let currentPilotFontSize = 9.5;
        if (pilotChain.length > 22) currentPilotFontSize = 7.5;
        if (pilotChain.length > 34) currentPilotFontSize = 6.0;
        if (pilotChain.length > 44) currentPilotFontSize = 5.0;
        doc.setFont("Helvetica", "normal"); doc.setFontSize(currentPilotFontSize);
        doc.text(pilotChain, c1 - 2, sY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.setFontSize(9.5); doc.text("Date", c1 + 2, sY + 4.5); 
        doc.setFont("Helvetica", "normal");
        let rawDate = getValue('date');
        let sortedDateStr = '';
        if (rawDate) {
          const splitBits = rawDate.split('-');
          if(splitBits.length === 3) {
            const mList = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            sortedDateStr = `${splitBits[2]}/${mList[parseInt(splitBits[1]) - 1]}/${splitBits[0].slice(-2)}`;
          }
        }
        doc.text(sortedDateStr, c2 - 2, sY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Movement", c2 + 2, sY + 4.5); 
        doc.setFont("Helvetica", "normal");
        let mvStr = getRadio('movement'); if(mvStr === 'REM') mvStr += ` (${getRadio('duration')})`;
        doc.text(mvStr, 198, sY + 4.5, { align: "right" });

        // Row 2
        let rY = sY + rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Vessel Name", 12, rY + 4.5); 
        doc.setFont("Helvetica", "bold"); doc.text(getValue('vesselName'), c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("From Berth", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('fromLoc'), c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("TO Berth", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('toLoc'), 198, rY + 4.5, { align: "right" });

        // Row 3
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Draft Fore / Aft", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(`${getValue('draftFore')}m / ${getValue('draftAft')}m`, c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("IMO Number", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('imoNumber'), c2 - 2, rY + 4.5, { align: "right" });

        doc.setFont("Helvetica", "bold"); doc.text("Depart Station", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('timeDepStation')), 198, rY + 4.5, { align: "right" });

        // Row 4
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Flag / Call Sign", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(`${getValue('flag')} / ${getValue('callSign')}`, c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Gross Tons", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('grossTonnage'), c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Pilot on Board", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('timePilotOnBoard')), 198, rY + 4.5, { align: "right" });

        // Row 5
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("LOA / Beam", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(`${getValue('loa')}m / ${getValue('beam')}m`, c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Deadweight", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('dwt'), c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Take Con", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('takeCon')), 198, rY + 4.5, { align: "right" });

        // Row 6
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Propulsion / Spd", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(`${getValue('propulsion')} / ${getValue('speed')} kts`, c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Build (Year)", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('buildDate'), c2 - 2, rY + 4.5, { align: "right" });

        doc.setFont("Helvetica", "bold"); doc.text("Enter Port / Last Line", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('enterPortLastLine')), 198, rY + 4.5, { align: "right" });

        // Row 7
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Props / Pitch", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(`${getRadio('props')} / ${getRadio('pitch')}`, c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Bulb Bow", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getRadio('bulbBow'), c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("First Line / Exit Port", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('firstLineExitPort')), 198, rY + 4.5, { align: "right" });

        // Row 8
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Rudders", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('rudders'), c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Helo Ops", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('helo'), c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("All Fast", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('allFast')), 198, rY + 4.5, { align: "right" });

        // Row 9
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Thrust Config", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(`${getRadio('thrust')} (${getRadio('tPower')})`, c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("SBT / D.Hull / IG", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(`${getRadio('sbt')} / ${getRadio('doubleHull')} / ${getRadio('inertGas')}`, c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Disembark", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('timeDisembark')), 198, rY + 4.5, { align: "right" });

        // Row 10
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Outport Dep HQ", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('timeOutportDep')), c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Outport Arr HQ", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('timeOutportArr')), c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Arr. Station", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('timeArrStation')), 198, rY + 4.5, { align: "right" });

        // Row 11
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Delays (H:MM)", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('delays'), c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Standby (H:MM)", c1 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getValue('standby'), c2 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("Cancellation", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(convertTo24HourPrintString(getValue('cancellation')), 198, rY + 4.5, { align: "right" });

        // Row 12
        rY += rowH;
        doc.setFont("Helvetica", "bold"); doc.text("Transfer By", 12, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getRadio('transferBy'), c1 - 2, rY + 4.5, { align: "right" });
        
        doc.setFont("Helvetica", "bold"); doc.text("", c1 + 2, rY + 4.5); // Spares Column
        
        doc.setFont("Helvetica", "bold"); doc.text("I.T. Cert (69)", c2 + 2, rY + 4.5); 
        doc.setFont("Helvetica", "normal"); doc.text(getRadio('itCert'), 198, rY + 4.5, { align: "right" });

        // --- COMMENTS FIELD BOX BOUNDARY ---
        doc.line(10, remarksTopY, 200, remarksTopY);
        doc.line(10, remarksTopY + 25, 200, remarksTopY + 25);
        
        doc.setFont("Helvetica", "bold"); doc.text("Comments & Operational Remarks:", 12, remarksTopY + 5); 
        doc.setFont("Helvetica", "normal");
        const splitTextLines = doc.splitTextToSize(getValue('comments') || 'No additional remarks entered.', 180);
        doc.text(splitTextLines, 12, remarksTopY + 11);

        doc.setFont("Helvetica", "bold"); 
        doc.text("I certify that the Pilot performed his/her duties to my satisfaction", 12, certTextY);

        // --- ATTESTATION SPLIT PANEL ---
        doc.line(10, sigTopY, 200, sigTopY); 
        doc.line(105, sigTopY, 105, absoluteFrameBottomY);   
        
        doc.setFont("Helvetica", "bold");
        doc.text("Master Name: " + getValue('masterName'), 12, sigTopY + 6); doc.text("Signature of Master", 12, sigTopY + 11);
        doc.text("Lead Pilot Name: " + getValue('pilotName1'), 107, sigTopY + 6); doc.text("Signature of Pilot 1 Only", 107, sigTopY + 11);

        if (masterPad && !masterPad.isEmpty()) doc.addImage(masterPad.toDataURL(), 'PNG', 12, sigTopY + 13, 85, 16);
        if (pilotPad && !pilotPad.isEmpty()) doc.addImage(pilotPad.toDataURL(), 'PNG', 107, sigTopY + 13, 85, 16);

        const targetVessel = getValue('vesselName') || 'Vessel';
        const formattedFileName = `Pilotage_Certificate_${targetVessel.replace(/\s+/g, '_')}.pdf`;

        if (dispatchEmail) {
          const bodyMsg = `Please find attached pilotage transit log grid certificate for ${targetVessel}.`;
          window.location.href = `mailto:?subject=${encodeURIComponent("Pilotage Transit - " + targetVessel)}&body=${encodeURIComponent(bodyMsg)}`;
        }

        doc.save(formattedFileName);
      } catch (err) {
        alert("Render Pipeline Crash: " + err.message);
      }
    }
  </script>
